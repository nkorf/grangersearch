name: Update CRAN download statistics

on:
  schedule:
    - cron: '0 0 * * *'   # Every day at midnight UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

jobs:
  update-downloads:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Install cranlogs
        run: install.packages("cranlogs", repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Generate downloads plot
        run: source("data-raw/cran_downloads_badge.R")
        shell: Rscript {0}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add man/figures/cran-downloads.png
          git diff --cached --quiet || git commit -m "Update CRAN download statistics"
          git push
